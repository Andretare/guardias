<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Guardias del Profesorado</title>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, doc, setDoc, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // ─────────────────────────────────────────────────────────────
    // 🔧 CONFIGURA AQUÍ TU PROYECTO DE FIREBASE
    // (obtén estos valores en https://console.firebase.google.com)
    // ─────────────────────────────────────────────────────────────
    const firebaseConfig = {
      apiKey:            "AIzaSyC1OHfXRmYYVRsRqoX77d6_lW6rFOYgUZU",
      authDomain:        "profe-guardia.firebaseapp.com",
      projectId:         "profe-guardia",
      storageBucket:     "profe-guardia.firebasestorage.app",
      messagingSenderId: "326613624422",
      appId:             "1:326613624422:web:1fca2f71f66b34a532afa7"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);

    const TEACHERS = ["Eloisa", "Begoña", "Samuel", "Andrea"];
    const COLORS   = {
      Eloisa: { bg:"#fde8f0", accent:"#e8437a", light:"#fbb6ce" },
      Begoña: { bg:"#e8f4fd", accent:"#2b7ec1", light:"#90cdf4" },
      Samuel: { bg:"#edfbf1", accent:"#276749", light:"#9ae6b4" },
      Andrea: { bg:"#fef9e8", accent:"#b7791f", light:"#f6e05e" },
    };

    let records = {};   // { "Eloisa::2025-06-02": { teacher, date, group } }
    let selDate = new Date().toISOString().split("T")[0];
    let activeTab = "registro";

    // ── Escucha cambios en tiempo real ──────────────────────────
    onSnapshot(collection(db, "guardias"), (snap) => {
      records = {};
      snap.forEach(d => { records[d.id] = d.data(); });
      render();
    });

    // ── Helpers ──────────────────────────────────────────────────
    const key  = (t, d) => `${t}::${d}`;
    const has  = (t, d) => !!records[key(t, d)];
    const total = (t)   => Object.values(records).filter(r => r.teacher === t).length;
    const fmtDate = (d) => new Date(d + "T12:00:00").toLocaleDateString("es-ES",
      { weekday:"short", day:"numeric", month:"short", year:"numeric" });
    const fmtDateLong = (d) => new Date(d + "T12:00:00").toLocaleDateString("es-ES",
      { weekday:"long", day:"numeric", month:"long", year:"numeric" });

    function showToast(msg) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.style.opacity = "1";
      setTimeout(() => t.style.opacity = "0", 2200);
    }

    // ── Toggle guardia ───────────────────────────────────────────
    async function toggleGuardia(teacher) {
      const k = key(teacher, selDate);
      if (has(teacher, selDate)) {
        await deleteDoc(doc(db, "guardias", k));
        showToast(`Guardia eliminada de ${teacher}`);
      } else {
        const groupInput = document.getElementById("group-input");
        const group = groupInput ? groupInput.value.trim() : "";
        await setDoc(doc(db, "guardias", k), { teacher, date: selDate, group });
        showToast(`Guardia registrada para ${teacher} ✓`);
      }
    }

    // ── Render ────────────────────────────────────────────────────
    function render() {
      const app = document.getElementById("app");
      const totalAll = Object.keys(records).length;

      const tabs = ["registro","historial","resumen"];
      const tabLabels = { registro:"📝 Registro", historial:"📅 Historial", resumen:"📊 Resumen" };

      // ── Registro tab ──
      const registroHTML = `
        <div class="card" style="margin-bottom:1.2rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap;">
          <span style="color:#e2d9c8;font-weight:600">📅</span>
          <input type="date" id="date-picker" value="${selDate}"
            style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:8px;color:#e2d9c8;padding:.45rem .8rem;font-size:.95rem;cursor:pointer"/>
          <span style="color:#a0aec0;font-size:.88rem;font-style:italic;text-transform:capitalize">${fmtDateLong(selDate)}</span>
        </div>
        <div class="card" style="margin-bottom:1.4rem;display:flex;align-items:center;gap:.8rem;flex-wrap:wrap;">
          <span style="color:#e2d9c8;font-weight:600">🏫 Grupo:</span>
          <input type="text" id="group-input" placeholder="ej: 1ºA, 2ºB…" maxlength="20"
            style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:8px;color:#e2d9c8;padding:.45rem .9rem;font-size:.95rem;width:160px"
            value="${getGroupForDate(selDate)}"/>
          <span style="color:#718096;font-size:.8rem">(se guarda al marcar la guardia)</span>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
          ${TEACHERS.map(t => {
            const active = has(t, selDate);
            const c = COLORS[t];
            const rec = records[key(t, selDate)];
            return `
            <button onclick="window._toggle('${t}')" style="
              background:${active ? c.bg : "rgba(255,255,255,0.05)"};
              border:2px solid ${active ? c.accent : "rgba(255,255,255,0.1)"};
              border-radius:16px;padding:1.2rem 1rem;cursor:pointer;transition:all .2s;text-align:center;
              transform:${active ? "scale(1.03)" : "scale(1)"};
              box-shadow:${active ? `0 4px 20px ${c.accent}44` : "none"}">
              <div style="font-size:1.8rem;margin-bottom:.3rem">${active ? "✅" : "👤"}</div>
              <div style="font-weight:700;font-size:1rem;color:${active ? c.accent : "#e2d9c8"}">${t}</div>
              <div style="font-size:.78rem;margin-top:.3rem;color:${active ? c.accent : "#718096"}">
                ${active ? (rec.group ? `Grupo: <b>${rec.group}</b>` : "Con guardia") : "Sin guardia"}
              </div>
              <div style="margin-top:.6rem;background:${active ? c.light : "rgba(255,255,255,0.08)"};border-radius:20px;padding:.2rem .7rem;display:inline-block;font-size:.76rem;color:${active ? c.accent : "#a0aec0"};font-weight:600">
                ${total(t)} total
              </div>
            </button>`;
          }).join("")}
        </div>`;

      // ── Historial tab ──
      const allDates = [...new Set(Object.values(records).map(r => r.date))].sort().reverse();
      const historialHTML = `
        <div class="card" style="overflow:hidden;padding:0">
          ${allDates.length === 0
            ? `<div style="padding:2rem;text-align:center;color:#718096">No hay guardias registradas aún.</div>`
            : allDates.map((d, i) => {
                const dayRecs = Object.values(records).filter(r => r.date === d);
                return `
                <div style="padding:.9rem 1.3rem;${i < allDates.length-1 ? "border-bottom:1px solid rgba(255,255,255,0.07)" : ""};display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:.5rem">
                  <span style="color:#90cdf4;font-size:.85rem;font-weight:600;min-width:170px">${fmtDate(d)}</span>
                  <div style="display:flex;gap:.4rem;flex-wrap:wrap;flex:1">
                    ${dayRecs.length === 0
                      ? `<span style="color:#4a5568;font-size:.82rem">Sin guardias</span>`
                      : dayRecs.map(r => `
                          <span style="background:${COLORS[r.teacher].bg};color:${COLORS[r.teacher].accent};border-radius:20px;padding:.2rem .7rem;font-size:.78rem;font-weight:600">
                            ${r.teacher}${r.group ? ` · ${r.group}` : ""}
                          </span>`).join("")}
                  </div>
                </div>`;
              }).join("")}
        </div>`;

      // ── Resumen tab ──
      const resumenHTML = TEACHERS.map(t => {
        const c = COLORS[t];
        const n = total(t);
        const pct = totalAll > 0 ? Math.round((n / totalAll) * 100) : 0;
        const recs = Object.values(records).filter(r => r.teacher === t).sort((a,b) => b.date.localeCompare(a.date));
        return `
        <div class="card">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.8rem">
            <span style="color:#e2d9c8;font-weight:700;font-size:1.05rem">👤 ${t}</span>
            <span style="background:${c.bg};color:${c.accent};border-radius:20px;padding:.25rem .9rem;font-weight:700;font-size:.95rem">${n} guardia${n!==1?"s":""}</span>
          </div>
          <div style="background:rgba(255,255,255,0.08);border-radius:99px;height:8px;margin-bottom:.6rem">
            <div style="background:${c.accent};border-radius:99px;height:8px;width:${pct}%;transition:width .5s"></div>
          </div>
          <div style="color:#718096;font-size:.8rem;margin-bottom:.7rem">${pct}% del total</div>
          <div style="display:flex;gap:.3rem;flex-wrap:wrap">
            ${recs.slice(0,6).map(r => `
              <span style="background:rgba(255,255,255,0.07);color:#a0aec0;border-radius:6px;padding:.15rem .5rem;font-size:.73rem">
                ${new Date(r.date+"T12:00:00").toLocaleDateString("es-ES",{day:"numeric",month:"short"})}${r.group ? " · "+r.group : ""}
              </span>`).join("")}
            ${recs.length > 6 ? `<span style="color:#718096;font-size:.73rem;align-self:center">+${recs.length-6} más</span>` : ""}
          </div>
        </div>`;
      }).join("");

      const contentMap = { registro: registroHTML, historial: historialHTML, resumen: resumenHTML };

      app.innerHTML = `
        <div style="text-align:center;margin-bottom:2rem">
          <div style="font-size:2.5rem;margin-bottom:.2rem">📋</div>
          <h1 style="color:#e2d9c8;font-size:1.8rem;font-weight:bold;margin:0;letter-spacing:.04em">Guardias del Profesorado</h1>
          <p style="color:#90cdf4;margin-top:.3rem;font-size:.9rem">${totalAll} guardia${totalAll!==1?"s":""} registrada${totalAll!==1?"s":""} en total · <span style="font-size:.8rem;opacity:.7">🔴 En tiempo real</span></p>
        </div>

        <div style="display:flex;gap:.5rem;margin-bottom:1.5rem;background:rgba(255,255,255,0.05);border-radius:12px;padding:4px">
          ${tabs.map(tab => `
            <button onclick="window._tab('${tab}')" style="flex:1;padding:.6rem;border-radius:9px;border:none;cursor:pointer;font-size:.88rem;font-weight:600;transition:all .2s;
              background:${activeTab===tab?"rgba(255,255,255,0.15)":"transparent"};
              color:${activeTab===tab?"#e2d9c8":"#718096"}">${tabLabels[tab]}</button>`).join("")}
        </div>

        <div id="tab-content">${contentMap[activeTab]}</div>
      `;

      // Restaurar eventos del date-picker y group-input
      const dp = document.getElementById("date-picker");
      if (dp) dp.addEventListener("change", e => { selDate = e.target.value; render(); });
    }

    function getGroupForDate(d) {
      // Devuelve el grupo de cualquier profesor que ya tenga guardia ese día
      const found = Object.values(records).find(r => r.date === d && r.group);
      return found ? found.group : "";
    }

    // ── Exponer al HTML ───────────────────────────────────────────
    window._toggle = toggleGuardia;
    window._tab    = (t) => { activeTab = t; render(); };

    render();
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      font-family: 'Segoe UI', sans-serif;
      padding: 1.5rem 1rem;
    }
    #app { max-width: 680px; margin: 0 auto; }
    .card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.11);
      border-radius: 14px;
      padding: 1rem 1.3rem;
      margin-bottom: 1rem;
    }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); }
    #toast {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
      background: #2d3748; color: #e2d9c8; padding: .7rem 1.4rem;
      border-radius: 12px; font-size: .9rem; font-weight: 600;
      box-shadow: 0 4px 20px rgba(0,0,0,.4); z-index: 999;
      opacity: 0; transition: opacity .3s; white-space: nowrap;
    }
    button { font-family: inherit; }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="toast"></div>
</body>
</html>
